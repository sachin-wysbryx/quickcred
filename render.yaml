services:
  - type: web
    name: quickcred-admin
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm --filter web start
    envVars:
      - key: DATABASE_URL
        sync: false # User will provide this in Render dashboard
      - key: SESSION_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: NODE_VERSION
        value: 20
      - key: PNPM_VERSION
        value: 10.31.0
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ALLOWED_ADMIN_EMAIL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
